<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        td {
            width: 100px;
            height: 100px;
            border: solid violet 1px;
        }

        .highlight {
            background-color: pink;
        }
    </style>

    <script>
        let staticTable, row_sel, col_sel, selectedTd;

        window.onload = function () {
            // 3x3 테이블 구조 객체화
            staticTable = {
                tds: document.getElementsByTagName("td"),
                total_rows: 3,
                total_cols: 3,
            }, row_sel = col_sel = 0
            highlight(selectTD(staticTable, row_sel, col_sel))






            //// 패턴 쓴거
            document.querySelectorAll("table").forEach(table => {
                table.addEventListener("mouseover", function change_location_hover(e) {
                    let td = e.target.closest('td');
                    if (!td) return;
                    if (!table.contains(td)) return;

                    row_sel = parseInt(e.target.getAttribute("nth_row"))
                    col_sel = parseInt(e.target.getAttribute("nth_col"))
                    highlight(selectTD(staticTable, row_sel, col_sel));
                }, {passive: true})
            })









            let i = 0;
            document.querySelectorAll("td").forEach(td => {
                const nth_row = parseInt(i / staticTable.total_cols)
                const nth_col = (i++ % staticTable.total_rows)
                td.setAttribute("nth_row", nth_row)
                td.setAttribute("nth_col", nth_col)
            })
        }

        window.addEventListener("keydown", function change_location_key(e) {
            switch (e.key) {
                case "ArrowRight": col_sel++; break;
                case "ArrowLeft": col_sel--; break;
                case "ArrowDown": row_sel++; break;
                case "ArrowUp": row_sel--; break;
            }
            row_sel = (row_sel < 0) ? (staticTable.total_rows - 1) : (row_sel % staticTable.total_rows)
            col_sel = (col_sel < 0) ? (staticTable.total_cols - 1) : (col_sel % staticTable.total_cols)

            highlight(selectTD(staticTable, row_sel, col_sel));
        }, {passive: true})

        function selectTD(table, row, col) {
            return table.tds[row * table.total_rows + col]
        }

        function highlight(td) {
            if (selectedTd) { // 이미 강조되어있는 칸이 있다면 원상태로 바꿔줌
                selectedTd.classList.remove('highlight');
            }
            selectedTd = td;
            selectedTd.classList.add('highlight'); // 새로운 td를 강조 함
        }

    </script>

</head>

<body>
<table>
    <tr>
        <td></td>
        <td></td>
        <td></td>
    </tr>
    <tr>
        <td></td>
        <td></td>
        <td></td>
    </tr>
    <tr>
        <td></td>
        <td></td>
        <td></td>
    </tr>
</table>

</body>

</html>
