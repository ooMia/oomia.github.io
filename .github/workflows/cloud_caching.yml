name: Cache static files on AWS S3 storage

env:
  PROJECT_PATH: my-gatsby

on:
  push:
    paths:
      - "*/public/static/*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          sparse-checkout: ./public/static/.
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Set AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: arn:aws:s3:::my-gatsby-contents:role/github-actions-cloud-caching
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: ap-northeast-2
      - name: Copy to AWS S3
        run: aws s3 sync ./build/static/. s3://
